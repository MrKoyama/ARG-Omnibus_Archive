<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O-PORTAL ログイン | OMNIBUS ARCHIVE 社内ポータル</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* ユーザー様よりご提示いただいた共通CSSコード（ここから） */
        /* =========================================
           カラー変数（ダーク・無機質なシステムカラー）
           ========================================= */
        :root {
            --sys-primary: #3b82f6; 
            --sys-accent: #60a5fa;  
            --sys-bg: #121212; 
            --sys-white: #1e1e1e; 
            --sys-text: #e2e8f0; 
            --sys-text-light: #94a3b8; 
            --sys-border: #334155; 
            --sys-header-bg: #0f172a; 
            --sys-alert: #ef4444; 
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans JP', "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            color: var(--sys-text);
            background-color: var(--sys-bg);
            line-height: 1.6;
            word-break: normal;
            overflow-wrap: break-word;
        }

        /* =========================================
           ヘッダー（ダーク・機能的）
           ========================================= */
        header {
            background-color: var(--sys-header-bg);
            border-bottom: 2px solid var(--sys-primary);
            position: sticky;
            top: 0;
            z-index: 2000;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            width: 100%;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            max-width: 100%;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--sys-primary);
            text-decoration: none;
            letter-spacing: 0.05em;
        }

        .logo-icon {
            height: 36px; 
            width: 36px;  
            object-fit: contain;
        }

        .system-name {
            font-size: 0.9rem;
            color: var(--sys-text-light);
            border-left: 1px solid var(--sys-border);
            padding-left: 15px;
            font-weight: 500;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* 検索欄（ダークUI対応） */
        .search-container {
            display: flex;
        }

        .search-container input[type="text"] {
            padding: 6px 12px;
            background-color: #1e293b;
            color: var(--sys-text);
            border: 1px solid var(--sys-border);
            border-radius: 2px 0 0 2px;
            outline: none;
            width: 250px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .search-container input[type="text"]::placeholder {
            color: #64748b;
        }

        .search-container input[type="text"]:focus {
            border-color: var(--sys-primary);
        }

        .search-container button {
            padding: 6px 15px;
            background-color: var(--sys-primary);
            color: #ffffff;
            border: 1px solid var(--sys-primary);
            border-radius: 0 2px 2px 0;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            font-family: inherit;
            transition: background-color 0.3s;
        }

        .search-container button:hover {
            background-color: #2563eb;
        }

        /* =========================================
           フッター
           ========================================= */
        footer {
            background-color: #0f172a; 
            color: #94a3b8;
            padding: 20px 30px; 
            margin-top: auto;
            border-top: 1px solid var(--sys-border);
            width: 100%;
        }

        .footer-content {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; 
            gap: 20px;
        }

        .disclaimer {
            font-size: 0.85rem;
            line-height: 1.6;
            margin: 0;
            flex: 1;
        }

        .footer-right {
            font-size: 1rem; 
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 0.05em;
            white-space: nowrap; 
            color: #94a3b8;
        }

        /* =========================================
           完全レスポンシブ・デッドスペース解消設定
           ========================================= */
        html {
            font-size: clamp(14px, 1vw + 10px, 18px); 
        }

        .header-top, .header-inner, .footer-content {
            width: 100%;
            max-width: 95%; 
            padding-left: 0;
            padding-right: 0;
            margin: 0 auto;
        }

        section, main, .article-container, .portal-container {
            width: 90%; 
            max-width: 1600px !important; 
            margin-left: auto;
            margin-right: auto;
            flex-grow: 1; 
        }

        @media (max-width: 768px) {
            section, main, .article-container, .portal-container {
                width: 100%;
                padding: 40px 5%;
            }
            .header-top, .header-inner {
                flex-direction: column;
                padding: 15px 5%;
            }
            .system-name {
                display: none;
            }
            .header-right {
                width: 100%;
                justify-content: space-between;
                margin-top: 10px;
            }
            .search-container {
                flex-grow: 1;
                margin-right: 15px;
            }
            .search-container input[type="text"] {
                width: 100%; 
            }
            .footer-content {
                flex-direction: column;
                text-align: center;
            }
        }
        /* ユーザー様よりご提示いただいた共通CSSコード（ここまで） */

        /* =========================================
           ログイン画面 専用UI
           ========================================= */
        .portal-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 60px auto;
        }

        .login-card {
            background-color: var(--sys-white);
            border: 1px solid var(--sys-border);
            border-top: 4px solid var(--sys-primary);
            border-radius: 4px;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 1.6rem;
            color: var(--sys-text);
            margin-bottom: 10px;
            letter-spacing: 0.1em;
        }

        .login-header p {
            font-size: 0.85rem;
            color: var(--sys-text-light);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--sys-text-light);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            background-color: #1a202c; 
            border: 1px solid var(--sys-border);
            border-radius: 4px;
            font-size: 1rem;
            font-family: 'Courier New', Courier, monospace; 
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            color: var(--sys-text); /* 社員IDの文字色 */
        }
        
        /* パスワード入力欄の修正：文字がマスクされるようにデフォルト動作に戻す */
        input[type="password"].form-control {
            color: var(--sys-text); /* 通常のテキストカラーに戻す */
            -webkit-text-security: disc; /* Safari/iOS向けに黒丸マスクを強制 (※非標準CSS) */
            /* caret-color はデフォルトでテキストカラーになるため不要 */
        }

        .form-control:focus {
            border-color: var(--sys-primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .form-control::placeholder {
            color: #64748b;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--sys-primary);
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.1em;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #2563eb;
        }

        /* =========================================
           カスタムモーダルダイアログ
           ========================================= */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 3000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background-color: var(--sys-white);
            border: 1px solid var(--sys-border);
            width: 90%;
            max-width: 400px;
            border-radius: 4px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        /* エラー時の赤いダイアログ */
        .modal-overlay.error .modal-content {
            border-top: 4px solid var(--sys-alert);
        }
        .modal-overlay.error .modal-icon {
            color: var(--sys-alert);
        }

        /* 成功時の青いダイアログ */
        .modal-overlay.success .modal-content {
            border-top: 4px solid var(--sys-primary);
        }
        .modal-overlay.success .modal-icon {
            color: var(--sys-primary);
        }

        .modal-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            font-family: sans-serif;
        }

        .modal-title {
            font-size: 1.2rem;
            color: var(--sys-text);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .modal-text {
            font-size: 0.95rem;
            color: var(--sys-text-light);
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .modal-btn {
            background-color: #334155;
            color: var(--sys-text);
            border: none;
            padding: 10px 30px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .modal-btn:hover {
            background-color: #475569;
        }

        @media (max-width: 768px) {
            .login-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- ヘッダー -->
    <header>
        <div class="header-inner">
            <div class="logo-area">
                <a href="toppage.html" class="logo">
                    <img src="images/logo.png" alt="OMNIBUS ARCHIVE Logo" class="logo-icon">
                    OMNIBUS ARCHIVE
                </a>
                <div class="system-name">社内ポータルシステム（O-PORTAL）</div>
            </div>
            
            <div class="header-right">
                <form class="search-container" action="search.html" method="GET">
                    <input type="text" name="q" placeholder="社内情報の検索..." required autocomplete="off">
                    <button type="submit">検索</button>
                </form>
            </div>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="portal-container">

        <div class="login-card">
            <div class="login-header">
                <h1>O-PORTAL LOGIN</h1>
                <p>社員IDとパスワードを入力してください。</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="emp-id">社員ID (Employee ID)</label>
                    <input type="text" id="emp-id" class="form-control" placeholder="E0000" autocomplete="off" required>
                </div>
                
                <div class="form-group">
                    <label for="emp-pass">パスワード (Password)</label>
                    <input type="password" id="emp-pass" class="form-control" placeholder="Enter Password" autocomplete="off" required>
                </div>

                <button type="submit" class="btn-submit">ログイン</button>
            </form>
        </div>

    </main>

    <!-- フッター -->
    <footer>
        <div class="footer-content">
            <p class="disclaimer">
                このサイトの内容はフィクションです。<br class="pc-br">
                登場する人物・団体・名称等は架空であり、実在のものとは関係ありません。
            </p>
            <!-- ページ番号36、レベルLv.2に設定 -->
            <div class="footer-right">
                &lt; 36/35 &gt; (Lv.2)
            </div>
        </div>
    </footer>

    <!-- カスタムモーダルダイアログ -->
    <div class="modal-overlay" id="system-modal">
        <div class="modal-content">
            <div class="modal-icon" id="modal-icon">⚠</div>
            <h3 class="modal-title" id="modal-title">認証エラー</h3>
            <p class="modal-text" id="modal-text">エラー内容がここに表示されます。</p>
            <button type="button" class="modal-btn" id="modal-close-btn">確認</button>
        </div>
    </div>

    <!-- ログイン判定用のJavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('login-form');
            const idInput = document.getElementById('emp-id');
            const passInput = document.getElementById('emp-pass');
            
            const modal = document.getElementById('system-modal');
            const modalIcon = document.getElementById('modal-icon');
            const modalTitle = document.getElementById('modal-title');
            const modalText = document.getElementById('modal-text');
            const modalBtn = document.getElementById('modal-close-btn');

            // モーダルを表示する関数
            const showModal = (type, title, text, btnText = "確認") => {
                modal.classList.remove('error', 'success');
                
                if (type === 'error') {
                    modal.classList.add('error');
                    modalIcon.textContent = '⚠';
                } else if (type === 'success') {
                    modal.classList.add('success');
                    modalIcon.textContent = '✔';
                }

                modalTitle.textContent = title;
                modalText.innerHTML = text; 
                modalBtn.textContent = btnText;
                
                modal.classList.add('active');
            };

            // モーダルを閉じる関数
            const closeModal = () => {
                modal.classList.remove('active');
                if (modal.classList.contains('success')) {
                    // ログイン後の遷移先URLを指定（例：admin_portal.html）
                    window.location.href = "admin_portal.html"; 
                } else {
                    passInput.value = ""; // エラー時はパスワードを空にする
                    passInput.focus();
                }
            };

            modalBtn.addEventListener('click', closeModal);

            // フォーム送信時の処理
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault(); 

                const enteredId = idInput.value.trim().toUpperCase(); 
                const enteredPass = passInput.value;

                // IDフォーマットのチェック（E + 数字4桁）
                const idMatch = enteredId.match(/^E(\d{4})$/);

                if (!idMatch) {
                    showModal('error', '認証エラー', 'この社員IDは使用されていません。<br>入力内容をご確認ください。');
                    return;
                }

                const idNumber = parseInt(idMatch[1], 10);

                // 1. 指定されたID範囲の場合
                // (E0246～E0422) または (E0239～E0244)
                const isTargetRange = (idNumber >= 246 && idNumber <= 422) || (idNumber >= 239 && idNumber <= 244) || (idNumber == 1);

                // 2. 中野理沙 (E0245) の場合
                const isNakano = (enteredId === 'E0245');

                if (isNakano) {
                    if (enteredPass === 'sN8hKHci') {
                        // ログイン成功（名前は表示しない）
                        showModal('success', '認証成功', 'ID: E0245 の認証を確認しました。<br>システムへ接続します。', 'アクセスする');
                    } else {
                        // パスワードが違う場合
                        showModal('error', '認証エラー', '入力されたパスワードが間違っています。');
                    }
                } else if (isTargetRange) {
                    // 指定された社員IDだが、パスワードの真偽に関わらずエラーを返す
                    showModal('error', '認証エラー', '入力されたパスワードが間違っています。');
                } else {
                    // 範囲外のID
                    showModal('error', '認証エラー', 'この社員IDは使用されていません。');
                }
            });
        });
    </script>

</body>
</html>
