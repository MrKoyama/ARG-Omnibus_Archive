<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社員ディレクトリ | OMNIBUS ARCHIVE 社内ポータル</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           カラー変数（ダーク・無機質なシステムカラー）
           ========================================= */
        :root {
            --sys-primary: #3b82f6; 
            --sys-accent: #60a5fa;  
            --sys-bg: #121212; 
            --sys-white: #1e1e1e; 
            --sys-text: #e2e8f0; 
            --sys-text-light: #94a3b8; 
            --sys-border: #334155; 
            --sys-header-bg: #0f172a; 
            --sys-alert: #ef4444; 
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans JP', "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            color: var(--sys-text);
            background-color: var(--sys-bg);
            line-height: 1.6;
            word-break: normal;
            overflow-wrap: break-word;
        }

        /* =========================================
           ヘッダー（ダーク・機能的）
           ========================================= */
        header {
            background-color: var(--sys-header-bg);
            border-bottom: 2px solid var(--sys-primary);
            position: sticky;
            top: 0;
            z-index: 2000;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            width: 100%;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            max-width: 100%;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--sys-primary);
            text-decoration: none;
            letter-spacing: 0.05em;
        }

        .logo-icon {
            height: 36px; 
            width: 36px;  
            object-fit: contain;
        }

        .system-name {
            font-size: 0.9rem;
            color: var(--sys-text-light);
            border-left: 1px solid var(--sys-border);
            padding-left: 15px;
            font-weight: 500;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* 検索欄（ダークUI対応） */
        .search-container {
            display: flex;
        }

        .search-container input[type="text"] {
            padding: 6px 12px;
            background-color: #1e293b;
            color: var(--sys-text);
            border: 1px solid var(--sys-border);
            border-radius: 2px 0 0 2px;
            outline: none;
            width: 250px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .search-container input[type="text"]::placeholder {
            color: #64748b;
        }

        .search-container input[type="text"]:focus {
            border-color: var(--sys-primary);
        }

        .search-container button {
            padding: 6px 15px;
            background-color: var(--sys-primary);
            color: #ffffff;
            border: 1px solid var(--sys-primary);
            border-radius: 0 2px 2px 0;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            font-family: inherit;
            transition: background-color 0.3s;
        }

        .search-container button:hover {
            background-color: #2563eb;
        }

        /* =========================================
           フッター
           ========================================= */
        footer {
            background-color: #0f172a; 
            color: #94a3b8;
            padding: 20px 30px; 
            margin-top: auto;
            border-top: 1px solid var(--sys-border);
            width: 100%;
        }

        .footer-content {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; 
            gap: 20px;
        }

        .disclaimer {
            font-size: 0.85rem;
            line-height: 1.6;
            margin: 0;
            flex: 1;
        }

        .footer-right {
            font-size: 1rem; 
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 0.05em;
            white-space: nowrap; 
            color: #94a3b8;
        }

        /* =========================================
           完全レスポンシブ・デッドスペース解消設定
           ========================================= */
        html {
            font-size: clamp(14px, 1vw + 10px, 18px); 
        }

        .header-top, .header-inner, .footer-content {
            width: 100%;
            max-width: 95%; 
            padding-left: 0;
            padding-right: 0;
            margin: 0 auto;
        }

        section, main, .article-container, .portal-container {
            width: 90%; 
            max-width: 1600px !important; 
            margin-left: auto;
            margin-right: auto;
            flex-grow: 1; 
        }

        @media (max-width: 768px) {
            section, main, .article-container, .portal-container {
                width: 100%;
                padding: 40px 5%;
            }
            .header-top, .header-inner {
                flex-direction: column;
                padding: 15px 5%;
            }
            .system-name {
                display: none;
            }
            .header-right {
                width: 100%;
                justify-content: space-between;
                margin-top: 10px;
            }
            .search-container {
                flex-grow: 1;
                margin-right: 15px;
            }
            .search-container input[type="text"] {
                width: 100%; 
            }
            .footer-content {
                flex-direction: column;
                text-align: center;
            }
        }

        /* =========================================
           ディレクトリ（社員名簿）専用UI
           ========================================= */
        .portal-container {
            margin-top: 40px;
            margin-bottom: 100px;
        }

        .breadcrumb {
            font-size: 0.85rem;
            color: var(--sys-text-light);
            margin-bottom: 20px;
        }

        .breadcrumb a {
            color: var(--sys-primary);
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .page-title {
            font-size: 1.6rem;
            color: var(--sys-text);
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .page-desc {
            font-size: 0.95rem;
            color: var(--sys-text-light);
            margin-bottom: 30px;
        }

        /* 検索・絞り込みツールバー */
        .toolbar {
            background-color: var(--sys-white);
            border: 1px solid var(--sys-border);
            border-radius: 4px;
            padding: 20px 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            flex-wrap: wrap;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toolbar label {
            font-size: 0.9rem;
            color: var(--sys-text-light);
            font-weight: 700;
        }

        .toolbar select, .toolbar input[type="text"] {
            padding: 8px 12px;
            background-color: #1e293b;
            color: var(--sys-text);
            border: 1px solid var(--sys-border);
            border-radius: 2px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }

        .toolbar select:focus, .toolbar input[type="text"]:focus {
            border-color: var(--sys-primary);
        }

        .btn-filter {
            padding: 8px 25px;
            background-color: var(--sys-primary);
            color: var(--sys-white);
            border: none;
            border-radius: 2px;
            cursor: pointer;
            font-weight: 700;
            transition: background-color 0.3s;
        }

        .btn-filter:hover {
            background-color: #2563eb;
        }

        /* 社員リストテーブル */
        .directory-card {
            background-color: var(--sys-white);
            border: 1px solid var(--sys-border);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .directory-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .directory-table th, .directory-table td {
            padding: 15px 20px;
            border-bottom: 1px solid #2a2a2a;
            text-align: left;
        }

        .directory-table tr:last-child td {
            border-bottom: none;
        }

        .directory-table th {
            background-color: #252525;
            color: var(--sys-text-light);
            font-weight: 500;
            white-space: nowrap;
        }

        .directory-table tr:hover td {
            background-color: #2a313d;
        }

        .col-id {
            font-family: 'Courier New', Courier, monospace;
            color: var(--sys-text-light);
            width: 100px;
        }

        .col-name {
            font-weight: 700;
            color: var(--sys-accent);
            width: 180px;
        }

        .col-dept {
            color: var(--sys-text);
        }

        .col-role {
            color: var(--sys-text-light);
        }

        .col-ext {
            font-family: 'Courier New', Courier, monospace;
            color: var(--sys-primary);
            width: 100px;
        }

        /* 検索結果が0件の時の表示 */
        .no-results {
            padding: 30px;
            text-align: center;
            color: var(--sys-text-light);
            display: none;
        }

        @media (max-width: 768px) {
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .toolbar-group {
                flex-direction: column;
                align-items: flex-start;
            }
            .toolbar select, .toolbar input[type="text"] {
                width: 100%;
            }
            
            /* スマホ用のテーブル調整 */
            .directory-table th { display: none; }
            .directory-table td {
                display: block;
                width: 100%;
                padding: 8px 15px;
                border-bottom: none;
            }
            .directory-table tr {
                display: block;
                border-bottom: 1px solid var(--sys-border);
                padding: 10px 0;
            }
            .col-id { display: none; }
            .col-name { font-size: 1.1rem; padding-bottom: 5px; width: 100%; }
            .col-ext::before { content: "内線: "; color: var(--sys-text-light); font-family: sans-serif; }
        }
    </style>
</head>

            </div>
            
            <div class="header-right">

                    <input type="text" name="q" placeholder="社内情報の検索..." required autocomplete="off">
                    <button type="submit">検索</button>
                </form>
            </div>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="portal-container">

        <div class="breadcrumb">
            <a href="o-portal.html">O-PORTAL トップ</a> &gt; 社員ディレクトリ
        </div>

        <h1 class="page-title">社員ディレクトリ</h1>
        <p class="page-desc">社内の組織図および全従業員の連絡先（内線番号）・配属部門を検索します。</p>

        <!-- 絞り込みツールバー -->

                <label for="dept-select">部署：</label>
                <select id="dept-select">
                    <option value="all">すべての部署</option>

            </div>
            <div class="toolbar-group">
                <label for="name-search">氏名検索：</label>
                <input type="text" id="name-search" placeholder="例：鈴木">
            </div>
            <!-- 検索ボタン（これを押した時にのみ絞り込みを実行する） -->
            <button class="btn-filter" type="button" id="btn-search">検索</button>
        </div>

        <!-- 社員リスト -->
        <div class="directory-card">
            <table class="directory-table">
                <thead>
                    <tr>
                        <th class="col-id">社員ID</th>
                        <th class="col-name">氏名</th>
                        <th class="col-dept">配属部門</th>
                        <th class="col-role">役職・担当</th>
                        <th class="col-ext">内線</th>
                    </tr>
                </thead>
                <tbody id="employee-list">
                    <!-- ここにJavaScriptで全185人分の固定データが描画されます -->
                </tbody>
            </table>
            <div id="no-results" class="no-results">該当する社員が見つかりませんでした。</div>
        </div>

    </main>

    <!-- フッター -->
    <footer>
        <div class="footer-content">
            <p class="disclaimer">
                このサイトの内容はフィクションです。<br class="pc-br">
                登場する人物・団体・名称等は架空であり、実在のものとは関係ありません。
            </p>
            <div class="footer-right">
                &lt; 35/35 &gt; (Lv.2)
            </div>
        </div>
    </footer>

            const nameSearch = document.getElementById('name-search');
            const btnSearch = document.getElementById('btn-search');
            const noResults = document.getElementById('no-results');

            // テーブルを描画する関数
            const renderTable = (employees) => {
                tbody.innerHTML = '';
                
                if (employees.length === 0) {
                    noResults.style.display = 'block';
                } else {
                    noResults.style.display = 'none';
                    employees.forEach(emp => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td class="col-id">${emp.id}</td>
                            <td class="col-name">${emp.name}</td>
                            <td class="col-dept">${emp.dept}</td>
                            <td class="col-role">${emp.role}</td>
                            <td class="col-ext">${emp.ext}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            };

            // 検索（絞り込み）を実行する関数
            const filterEmployees = () => {
                const selectedDept = deptSelect.value;
                const searchWord = nameSearch.value.trim().toLowerCase();

                const filtered = allEmployees.filter(emp => {
                    // 部署の判定
                    const matchDept = (selectedDept === 'all') || (emp.dept === selectedDept);
                    // 氏名の判定（スペースを抜いて検索しやすくする）
                    const empNameNoSpace = emp.name.replace(/\s+/g, '');
                    const searchWordNoSpace = searchWord.replace(/\s+/g, '');
                    const matchName = empNameNoSpace.includes(searchWordNoSpace);

                    return matchDept && matchName;
                });

                renderTable(filtered);
            };

            // 「検索」ボタンがクリックされた時にのみ絞り込みを実行する
            btnSearch.addEventListener('click', filterEmployees);

            // エンターキーでも検索できるようにする
            nameSearch.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    filterEmployees();
                }
            });

            renderTable(allEmployees);
